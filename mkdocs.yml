site_name: PANOPTES Observatory Control System
site_url: https://panoptes.github.io/POCS/
repo_url: https://github.com/panoptes/POCS
repo_name: panoptes/POCS
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.snippets:
      base_path: "."
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Project PANOPTES Hub: https://panoptes.github.io/
  - Home: index.md
  - Conceptual Overview: conceptual-overview.md
  - Architecture: architecture-for-beginners.md
  - CLI Guide: cli-guide.md
  - Glossary: glossary.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Authors: authors.md
  - License: license.md
