[unix_http_server]
chown=panoptes:panoptes

[supervisord]
environment=
    USER="panoptes",
    HOME="/home/panoptes",
    PATH="$PATH:/home/panoptes/bin",
    GOOGLE_APPLICATION_CREDENTIALS="/home/panoptes/keys/panoptes-upload-key.json"

[program:pocs-config-server]
priority=1
user=panoptes
directory=/home/panoptes
command=panoptes-utils config run --host 0.0.0.0 --port 6563 --config-file conf_files/pocs.yaml
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/config-server.log
autorestart=true
stopasgroup=true
killasgroup=true

[program:pocs-power-monitor]
user=panoptes
directory=/home/panoptes
command=uvicorn --host 0.0.0.0 --port 6564 panoptes.pocs.utils.service.power:app
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/power-monitor.log
autostart=true
startsecs=10
stopasgroup=true
killasgroup=true

[program:pocs-jupyter-server]
user=panoptes
directory=/home/panoptes
command=pocs notebook start --port 6565
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/jupyter-server.log
autostart=false
stopasgroup=true
killasgroup=true

; Use this weather reader if your weather station is connected to the POCS computer.
[program:pocs-weather-reader]
user=panoptes
directory=/home/panoptes
command=uvicorn --host 0.0.0.0 --port 6566 panoptes.pocs.utils.service.weather:app
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/weather-reader.log
autostart=true
startsecs=10
stopasgroup=true
killasgroup=true

; Use this weather reader if your weather station is NOT connected to the POCS computer.
[program:pocs-weather-reader-remote]
user=panoptes
directory=/home/panoptes
command=pocs sensor monitor weather --read-frequency 90
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/weather-reader.log
autostart=false
stopasgroup=true
killasgroup=true

[program:pocs-metadata-uploader]
user=panoptes
directory=/home/panoptes
command=pocs network upload-metadata --verbose --dir-path="/home/panoptes/json_store/panoptes"
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/metadata-uploader.log
autostart=true
stopasgroup=true
killasgroup=true

[program:pocs-mount-service]
priority=10
user=panoptes
directory=/home/panoptes
command=uvicorn --host 0.0.0.0 --port 8001 panoptes.pocs.services.mount_api:app
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/mount-service.log
autostart=true
startsecs=5
stopasgroup=true
killasgroup=true

[program:pocs-camera-service]
priority=11
user=panoptes
directory=/home/panoptes
command=uvicorn --host 0.0.0.0 --port 8002 panoptes.pocs.services.camera_api:app
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/camera-service.log
autostart=true
startsecs=5
stopasgroup=true
killasgroup=true

[program:pocs-scheduler-service]
priority=12
user=panoptes
directory=/home/panoptes
command=uvicorn --host 0.0.0.0 --port 8003 panoptes.pocs.services.scheduler_api:app
redirect_stderr=true
stdout_logfile=/home/panoptes/logs/scheduler-service.log
autostart=true
startsecs=5
stopasgroup=true
killasgroup=true
